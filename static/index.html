<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinuxDo 邀请码</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #faf8f5;
            --surface: #ffffff;
            --border: #e8e2d9;
            --text: #2c2416;
            --text-secondary: #7a7060;
            --text-muted: #b0a898;
            --accent: #d4622a;
            --accent-light: #fdf0e9;
            --success: #4a8c5e;
            --success-bg: #eef5f0;
            --error: #c0392b;
            --error-bg: #fdf0ee;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 560px;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 48px 40px;
            box-shadow: 0 1px 3px rgba(44, 36, 22, 0.04), 0 8px 24px rgba(44, 36, 22, 0.06);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: var(--accent);
            border-radius: 12px;
            margin-bottom: 20px;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-bottom: 28px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
        }

        .status-dot.offline {
            background: var(--error);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        .input {
            width: 100%;
            padding: 13px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: inherit;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input::placeholder {
            color: var(--text-muted);
        }

        .input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn {
            width: 100%;
            padding: 13px 24px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        .btn:hover:not(:disabled) {
            background: #bf5825;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(212, 98, 42, 0.25);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
            box-shadow: none;
        }

        .btn:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-loading {
            position: relative;
            color: transparent;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 18px;
            height: 18px;
            margin: -9px 0 0 -9px;
            border: 2px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 13px;
            margin-top: 16px;
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .message.show { display: block; }

        .message.success {
            background: var(--success-bg);
            border: 1px solid rgba(74, 140, 94, 0.2);
            color: var(--success);
        }

        .message.error {
            background: var(--error-bg);
            border: 1px solid rgba(192, 57, 43, 0.15);
            color: var(--error);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .code-display {
            display: none;
            text-align: center;
            padding: 20px 0 8px;
        }

        .code-display.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .code-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .code-value {
            font-family: 'Courier New', monospace;
            font-size: 30px;
            font-weight: 700;
            letter-spacing: 5px;
            color: var(--accent);
            padding: 18px 28px;
            background: var(--accent-light);
            border: 1px solid rgba(212, 98, 42, 0.15);
            border-radius: 12px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.2s;
            user-select: all;
            word-break: break-all;
            text-align: center;
        }

        .code-value:hover {
            background: #fde8d9;
            transform: scale(1.01);
        }

        .code-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            transition: color 0.2s;
        }

        .code-value.copied + .code-hint {
            color: var(--success);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 28px 0;
        }

        .rules {
            margin-bottom: 28px;
        }

        .rules-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .rules-list {
            list-style: none;
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.7;
        }

        .rules-list li {
            padding: 2px 0;
            padding-left: 16px;
            position: relative;
        }

        .rules-list li::before {
            content: '·';
            position: absolute;
            left: 0;
            color: var(--accent);
            font-weight: 700;
        }

        .records-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .records-list {
            max-height: 180px;
            overflow-y: auto;
        }

        .records-empty {
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            padding: 16px 0;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            font-size: 13px;
            color: var(--text-secondary);
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 4px;
        }

        .record-email {
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .record-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .footer a {
            color: var(--text-secondary);
            text-decoration: underline;
            text-decoration-color: var(--border);
            text-underline-offset: 3px;
            transition: color 0.2s, text-decoration-color 0.2s;
        }

        .footer a:hover {
            color: var(--accent);
            text-decoration-color: var(--accent);
        }

        .click-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 20px;
            margin-bottom: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .click-btn {
            flex: 1;
            padding: 11px 20px;
            background: var(--accent-light);
            border: 1px solid rgba(212, 98, 42, 0.2);
            border-radius: 10px;
            color: var(--accent);
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .click-btn:hover:not(:disabled) {
            background: #fde8d9;
        }

        .click-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .click-count {
            flex: 1;
            font-size: 12px;
            color: var(--text-muted);
            white-space: nowrap;
            text-align: right;
        }

        .admin-toggle {
            text-align: center;
            margin-top: 20px;
        }

        .admin-toggle a {
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: underline;
            text-decoration-color: var(--border);
            text-underline-offset: 3px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .admin-toggle a:hover {
            color: var(--accent);
        }

        @media (max-width: 520px) {
            .card { padding: 36px 24px; border-radius: 12px; }
            .title { font-size: 24px; }
            .code-value { font-size: 24px; letter-spacing: 3px; padding: 14px 20px; }
            .logo { width: 46px; height: 46px; font-size: 22px; border-radius: 10px; }
        }
    </style>
    <script async defer src="/altcha.min.js" type="module"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo">L</div>
                <h1 class="title">LinuxDo 邀请码</h1>
                <p class="subtitle">输入邮箱，获取邀请链接</p>
            </div>

            <div class="status-bar">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">检查库存中...</span>
            </div>

            <div id="applyForm">
                <div class="form-group">
                    <label class="label">邮箱地址</label>
                    <input type="email" class="input" id="emailInput" placeholder="123456@qq.com" autocomplete="email">
                </div>
                <div class="form-group" id="altchaWrap" style="display:none;">
                    <altcha-widget
                        challenge="/api/invite/challenge"
                        auto="off"
                        hidefooter
                        hidelogo
                    ></altcha-widget>
                </div>
                <button class="btn" id="submitBtn" disabled>
                    <span id="btnText">申请邀请码</span>
                </button>
            </div>

            <div class="code-display" id="codeDisplay">
                <div class="code-label">你的邀请码</div>
                <div class="code-value" id="codeValue" onclick="copyCode()"></div>
                <div class="code-hint" id="codeHint">点击复制</div>
            </div>

            <div class="message" id="message"></div>

            <div class="divider"></div>

            <div class="rules">
                <div class="rules-title">申请须知</div>
                <ul class="rules-list">
                    <li>仅支持数字 QQ 邮箱，每个邮箱限领一次</li>
                    <li>验证链接 30 分钟内有效</li>
                    <li>本站规则不代表 Linux Do 社区规则，请以官网为准</li>
                </ul>
            </div>

            <div class="click-section">
                <button class="click-btn" id="clickBtn">让我知道你需要邀请码</button>
                <span class="click-count" id="clickCount">-</span>
            </div>

            <div class="records">
                <div class="records-title">
                    <span>最近领取</span>
                    <span id="totalRecords" style="font-weight:400;text-transform:none;letter-spacing:0;margin-left:6px;color:var(--text-secondary);font-size:11px;"></span>
                </div>
                <div class="records-list" id="recordsList">
                    <div class="records-empty">加载中...</div>
                </div>
            </div>

            <!-- 管理员入口 -->
            <div class="admin-toggle">
                <a onclick="toggleAdmin()">管理员入口</a>
            </div>
        </div>

        <div class="footer">
            <a href="https://linux.do" target="_blank">linux.do</a> · mawai ·
            <a href="https://github.com/mamawai/linuxdo-invitecode" target="_blank" title="GitHub" style="vertical-align:middle;">
                <svg height="16" width="16" viewBox="0 0 16 16" fill="currentColor" style="vertical-align:-3px;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
            <br>如果对你有帮助，欢迎给个 <a href="https://github.com/mamawai/linuxdo-invitecode" target="_blank">⭐ Star</a>
        </div>
    </div>

    <script>
        const API_BASE = '/api/invite';

        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            if (token) {
                await verifyToken(token);
            } else {
                await checkStatus();
                await loadRecentRecords();
            }
            await loadClicks();
        });

        async function checkStatus() {
            try {
                const res = await fetch(`${API_BASE}/status`);
                const data = await res.json();
                if (data.code === 200 && data.data === true) {
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').textContent = '邀请码充足';
                    document.getElementById('submitBtn').disabled = false;
                } else {
                    document.getElementById('statusDot').className = 'status-dot offline';
                    document.getElementById('statusText').textContent = '暂无库存';
                    document.getElementById('submitBtn').disabled = true;
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = '网络错误';
            }
        }

        async function verifyToken(token) {
            document.getElementById('statusText').textContent = '验证中...';
            document.getElementById('applyForm').style.display = 'none';
            try {
                const res = await fetch(`${API_BASE}/verify?token=${encodeURIComponent(token)}`);
                const data = await res.json();
                if (data.code === 200 && data.data) {
                    // 清除 URL 中的 token 参数，防止刷新重复验证
                    history.replaceState(null, '', window.location.pathname);
                    document.getElementById('statusDot').className = 'status-dot';
                    document.getElementById('statusText').textContent = '验证成功';
                    document.getElementById('codeValue').textContent = data.data;
                    document.getElementById('codeDisplay').classList.add('show');
                    showMessage('success', '邀请码领取成功，请妥善保管');
                    await loadRecentRecords();
                } else {
                    document.getElementById('statusDot').className = 'status-dot offline';
                    document.getElementById('statusText').textContent = '验证失败';
                    showMessage('error', data.message || '链接已失效或无效');
                    document.getElementById('applyForm').style.display = 'block';
                    await checkStatus();
                    await loadRecentRecords();
                }
            } catch (e) {
                document.getElementById('statusDot').className = 'status-dot offline';
                document.getElementById('statusText').textContent = '网络错误';
                showMessage('error', '网络错误，请刷新重试');
                document.getElementById('applyForm').style.display = 'block';
                await loadRecentRecords();
            }
        }

        async function submitApply() {
            const email = document.getElementById('emailInput').value.trim();
            if (!email) { showMessage('error', '请输入邮箱地址'); return; }
            if (!/^\d+@qq\.com$/i.test(email)) { showMessage('error', '仅支持数字QQ邮箱（如 123456@qq.com）'); return; }

            // 检查 POW 验证是否完成
            const widget = document.querySelector('altcha-widget');
            const altchaInput = widget ? widget.querySelector('input[name="altcha"]') : null;
            if (widget && (!altchaInput || !altchaInput.value)) {
                // 显示 widget，提示用户先完成验证
                document.getElementById('altchaWrap').style.display = '';
                showMessage('error', '请先完成人机验证');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = true;
            btn.classList.add('btn-loading');
            doApply(email);
        }

        async function doApply(email) {
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            try {
                const form = new URLSearchParams(); form.append('email', email);
                // 附加 altcha POW payload
                const altchaInput = document.querySelector('altcha-widget input[name="altcha"]');
                if (altchaInput && altchaInput.value) { form.append('altcha', altchaInput.value); }
                const res = await fetch(`${API_BASE}/apply`, { method: 'POST', body: form });
                const data = await res.json();
                if (data.code === 200) {
                    showMessage('success', '申请成功，请查收邮件并点击验证链接');
                    document.getElementById('emailInput').disabled = true;
                    btnText.textContent = '已发送';
                } else {
                    showMessage('error', data.message || '申请失败');
                    btn.disabled = false;
                }
            } catch (e) {
                showMessage('error', '网络错误，请稍后重试');
                btn.disabled = false;
            } finally {
                btn.classList.remove('btn-loading');
            }
        }

        function showMessage(type, text) {
            const msg = document.getElementById('message');
            msg.className = `message ${type} show`;
            msg.textContent = text;
        }

        function copyCode() {
            const code = document.getElementById('codeValue').textContent;
            navigator.clipboard.writeText(code).then(() => {
                document.getElementById('codeValue').classList.add('copied');
                document.getElementById('codeHint').textContent = '已复制';
                setTimeout(() => {
                    document.getElementById('codeValue').classList.remove('copied');
                    document.getElementById('codeHint').textContent = '点击复制';
                }, 2000);
            });
        }

        document.getElementById('submitBtn').addEventListener('click', submitApply);
        document.getElementById('emailInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') submitApply();
        });

        async function loadRecentRecords() {
            const list = document.getElementById('recordsList');
            const totalEl = document.getElementById('totalRecords');
            try {
                const res = await fetch(`${API_BASE}/records?limit=10`);
                const data = await res.json();
                if (data.code === 200 && data.data && data.data.list && data.data.list.length > 0) {
                    totalEl.textContent = `共${data.data.total}人领取过`;
                    list.innerHTML = data.data.list.map(r => {
                        const date = new Date(r.claimedAt);
                        return `<div class="record-item">
                            <span class="record-email">${r.maskedIdentifier}</span>
                            <span class="record-time">${formatTime(date)}</span>
                        </div>`;
                    }).join('');
                } else {
                    totalEl.textContent = data.data && data.data.total > 0 ? `共${data.data.total}人领取过` : '';
                    list.innerHTML = '<div class="records-empty">暂无记录</div>';
                }
            } catch (e) {
                totalEl.textContent = '';
                list.innerHTML = '<div class="records-empty">加载失败</div>';
            }
        }

        async function loadClicks() {
            try {
                const res = await fetch(`${API_BASE}/clicks`);
                const data = await res.json();
                if (data.code === 200) {
                    document.getElementById('clickCount').textContent = data.data + ' 次点击';
                }
            } catch (e) {
                document.getElementById('clickCount').textContent = '-';
            }
        }

        let clickLoading = false;
        document.getElementById('clickBtn').addEventListener('click', async () => {
            const btn = document.getElementById('clickBtn');
            if (clickLoading) return;
            clickLoading = true;
            btn.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/click`, { method: 'POST' });
                const data = await res.json();
                if (data.code === 200) {
                    btn.textContent = '已记录 ✓';
                    let current = parseInt(document.getElementById('clickCount').textContent) || 0;
                    document.getElementById('clickCount').textContent = (current + 1) + ' 次点击';
                    setTimeout(() => { btn.textContent = '让我知道你需要邀请码'; btn.disabled = false; clickLoading = false; }, 200);
                    return;
                } else {
                    showMessage('error', data.message || '操作过于频繁，请稍后再试');
                }
            } catch (e) {}
            btn.textContent = '让我知道你需要邀请码';
            btn.disabled = false;
            clickLoading = false;
        });

        function formatTime(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return '刚刚';
            if (diff < 3600) return Math.floor(diff / 60) + ' 分钟前';
            if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
            if (diff < 2592000) return Math.floor(diff / 86400) + ' 天前';
            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        /* 管理员入口：弹窗验证密钥后跳转 */
        async function toggleAdmin() {
            const key = prompt('请输入管理密钥');
            if (!key) return;
            try {
                const res = await fetch(`${API_BASE}/admin/verify`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key })
                });
                const data = await res.json();
                if (data.code === 200) {
                    sessionStorage.setItem('adminKey', key);
                    window.location.href = '/admin';
                } else {
                    alert(data.message || '密钥错误');
                }
            } catch (e) {
                alert('网络错误');
            }
        }
    </script>
